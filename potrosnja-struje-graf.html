<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potrošnja struje (HEP Elektra)</title>
  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      max-width: 800px; 
      margin: 40px auto; 
      padding: 20px; 
      background-color: #f4f4f9; 
      color: #333; 
    }
    .card { 
      background: white; 
      border-radius: 16px; 
      padding: 40px; 
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); 
    }
    h1 { 
      margin-top: 0; 
      color: #1a202c; 
      font-size: 24px; 
      text-align: center; 
      margin-bottom: 10px; 
    }
    p.subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 50px;
    }
    .chart { 
      display: flex; 
      align-items: flex-end; 
      justify-content: space-around; 
      height: 350px; 
      padding-bottom: 10px; 
      border-bottom: 2px solid #e2e8f0; 
      margin-top: 20px; 
    }
    .bar-container { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-end; 
      height: 100%; 
      width: 80px; 
    }
    .bar { 
      width: 100%; 
      border-radius: 8px 8px 0 0; 
      transition: height 0.5s ease-in-out; 
      display: flex; 
      align-items: flex-start; 
      justify-content: center; 
      position: relative; 
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
    }
    .bar span { 
      position: absolute; 
      top: -30px; 
      font-weight: 600; 
      font-size: 15px; 
      color: #2d3748; 
    }
    .label { 
      margin-top: 20px; 
      font-size: 15px; 
      color: #4a5568; 
      font-weight: 600; 
    }
    .trend-up {
      color: #e53e3e;
      font-weight: bold;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Potrošnja struje po mjesecima</h1>
    <p class="subtitle">HEP Elektra - Prikaz u eurima (€)</p>
    <div class="chart">
      <div class="bar-container">
        <div class="bar" style="height: 19%; background-color: #9ae6b4;"><span>10.58 €</span></div>
        <div class="label">11/2025</div>
      </div>
      <div class="bar-container">
        <div class="bar" style="height: 62%; background-color: #68d391;"><span>33.58 €</span></div>
        <div class="label">12/2025</div>
        <div class="trend-up">+217%</div>
      </div>
      <div class="bar-container">
        <div class="bar" style="height: 76%; background-color: #48bb78;"><span>41.61 €</span></div>
        <div class="label">01/2026</div>
        <div class="trend-up">+24%</div>
      </div>
      <div class="bar-container">
        <div class="bar" style="height: 100%; background-color: #38a169;"><span>54.42 €</span></div>
        <div class="label">02/2026</div>
        <div class="trend-up">+31%</div>
      </div>
    </div>
  </div>
</body>
</html>
